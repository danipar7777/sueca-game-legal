<!DOCTYPE html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D121B;display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;font-family:sans-serif;color:#fff;overflow:hidden}
.wrap{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{width:100px;height:100px;border-radius:22px;box-shadow:0 4px 30px rgba(233,69,96,0.2),0 2px 16px rgba(0,0,0,0.5);opacity:0;animation:logoIn 0.6s ease 0.3s both,glowP 3s ease 1.5s infinite}
.glass{background:rgba(13,18,27,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:18px;padding:18px 28px;border:1px solid rgba(233,69,96,0.15);text-align:center;margin-top:28px;opacity:0;animation:reveal 0.7s ease 0.8s both}
.t1{font-weight:900;font-size:32px;line-height:1.15;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,0.6)}
.t2{font-weight:900;font-size:46px;line-height:1.15;color:#e94560;text-shadow:0 0 40px rgba(233,69,96,0.4)}
.t2 span{color:#fff}
.sub{color:#64748b;font-size:14px;font-style:italic;margin-top:16px;opacity:0;animation:fadeUp 0.5s ease 1.5s both}
@keyframes logoIn{from{opacity:0;transform:scale(0.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes reveal{from{opacity:0;transform:translateY(24px);filter:blur(10px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowP{0%,100%{box-shadow:0 4px 30px rgba(233,69,96,0.15)}50%{box-shadow:0 4px 50px rgba(233,69,96,0.35)}}
</style></head><body>
